name: Migrate Database (manual only)

# Chỉ chạy khi bấm "Run workflow" thủ công trên tab Actions của GitHub,
# KHÔNG tự động chạy theo push để tránh xoá nhầm data.
on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Chạy lại và XOÁ SẠCH data hiện tại? (true/false)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Call migrate.php
        run: |
          URL="https://coffeegame.plt.pro.vn/deploy/migrate.php?token=${{ secrets.MIGRATE_TOKEN }}"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            URL="${URL}&force=1"
          fi
          echo "Calling: (token hidden)"
          curl -f -s "$URL"
          echo ""
